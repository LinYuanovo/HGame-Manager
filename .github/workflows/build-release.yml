name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.2)'
        required: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Create Release Archive
        run: |
          $version = "${{ github.event.inputs.version || github.ref_name }}"
          $archiveName = "HGame-Manager-$version-windows.zip"
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath $archiveName
          echo "ARCHIVE_NAME=$archiveName" >> $env:GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: HGame-Manager-*.zip

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract Changelog
        id: changelog
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION_NUM="${VERSION#v}"
          NOTES=$(sed -n "/^## v${VERSION_NUM}/,/^## v/{/^## v${VERSION_NUM}/p;/^## v/!p;}" CHANGELOG.md | sed '$d' | tail -n +2)
          if [ -z "$NOTES" ]; then
            NOTES="- 详见 CHANGELOG.md"
          fi
          {
            echo "## 📦 下载说明"
            echo "- 下载 \`HGame-Manager-${VERSION}-windows.zip\`"
            echo "- 解压到任意目录（保持目录结构完整）"
            echo "- 运行 \`hgame_manager.exe\`"
            echo ""
            echo "## ℹ️ 系统要求"
            echo "- Windows 10/11 (64位)"
            echo "- 首次运行可能需要几秒钟初始化"
            echo ""
            echo "## ⚠️ 注意事项"
            echo "- 如遇杀毒软件误报，请添加信任或临时关闭防护"
            echo ""
            echo "## 📝 更新内容"
            echo ""
            echo "$NOTES"
          } > release_notes.md
          cat release_notes.md

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: '*.zip'
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
