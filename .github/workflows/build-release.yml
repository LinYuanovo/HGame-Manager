name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.2)'
        required: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Create Release Archive
        run: |
          $version = "${{ github.event.inputs.version || github.ref_name }}"
          $archiveName = "HGame-Manager-$version-windows.zip"
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath $archiveName
          echo "ARCHIVE_NAME=$archiveName" >> $env:GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: HGame-Manager-*.zip

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract Changelog
        id: changelog
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          # 去掉 v 前缀
          VERSION_NUM="${VERSION#v}"
          # 提取当前版本到下一个版本之间的内容
          NOTES=$(sed -n "/^## v${VERSION_NUM}/,/^## v/{/^## v${VERSION_NUM}/p;/^## v/!p;}" CHANGELOG.md | sed '$d' | tail -n +2)
          # 如果没找到，使用默认内容
          if [ -z "$NOTES" ]; then
            NOTES="Release ${VERSION}"
          fi
          # 写入文件（处理多行内容）
          echo "$NOTES" > release_notes.md
          cat release_notes.md

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: '*.zip'
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
